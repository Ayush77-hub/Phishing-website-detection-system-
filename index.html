<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Phishing Detector</title>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container"><a class="navbar-brand" href="/">PhishGuard AI</a></div>
    </nav>
    <div class="container mt-5 text-center">
        <h1>Detect Phishing Websites</h1>
        <p>Enter a URL to check its safety status using Machine Learning.</p>
        <form action="/detect" method="POST" class="mt-4">
            <input type="text" name="url" class="form-control mb-3" placeholder="https://example.com" required>
            <button class="btn btn-primary btn-lg">Check URL</button>
        </form>
    </div>
</body>
</html>
